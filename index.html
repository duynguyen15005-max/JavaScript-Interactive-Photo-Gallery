<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Photo Gallery</title>
    <style>
        #image {
            width: 600px;
            height: 400px;
            border: 2px solid black;
            background-size: cover;
            background-position: center;
            text-align: center;
            line-height: 400px;
            font-size: 20px;
            margin-bottom: 20px;
        }

        img {
            width: 150px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
    <script src="script.js"></script>
</head>
<body>

<div id="image">
    Hover over an image below to display here.
</div>

<img src="https://nupet.vn/wp-content/uploads/2023/11/anh-meo-hai-huoc-nupet-21.jpg"
     alt="Funny Cat"
     onmouseover="upDate(this)"
     onmouseout="undo()">

<img src="https://app.gak.vn/storage/uploads/TEBSifrzJ5UT9J84EmfG8aFI2Ws1ENSgtNG5qph8.jpg"
     alt="Cute Cat"
     onmouseover="upDate(this)"
     onmouseout="undo()">

<img src="https://cdn-media.sforum.vn/storage/app/media/wp-content/uploads/2023/08/hinh-nen-meo.jpg"
     alt="Lovely Cat"
     onmouseover="upDate(this)"
     onmouseout="undo()">

</body>
</html>
